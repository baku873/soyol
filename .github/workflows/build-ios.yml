name: Build iOS (Compile Check)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prepare web assets stub for Capacitor sync
        run: |
          mkdir -p out
          cat > out/index.html << 'EOF'
          <!DOCTYPE html>
          <html><head><title>Soyol</title></head><body></body></html>
          EOF

      - name: Sync Capacitor (iOS)
        run: npx cap sync ios

      - name: Install CocoaPods
        run: |
          if [ -f ios/App/Podfile ]; then
            echo "Podfile found — running pod install"
            cd ios/App
            pod install --repo-update
          else
            echo "No Podfile found — skipping pod install"
          fi

      - name: Select Xcode project or workspace
        id: xcode_target
        run: |
          if [ -f ios/App/App.xcworkspace/contents.xcworkspacedata ]; then
            echo "target=-workspace ios/App/App.xcworkspace" >> $GITHUB_OUTPUT
            echo "scheme=App" >> $GITHUB_OUTPUT
            echo "Using xcworkspace"
          else
            echo "target=-project ios/App/App.xcodeproj" >> $GITHUB_OUTPUT
            echo "scheme=App" >> $GITHUB_OUTPUT
            echo "Using xcodeproj"
          fi

      - name: Build iOS (no code signing)
        run: |
          xcodebuild build \
            ${{ steps.xcode_target.outputs.target }} \
            -scheme ${{ steps.xcode_target.outputs.scheme }} \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            | xcpretty --color || true

      - name: Show build result
        if: always()
        run: |
          echo "Build finished. Check logs above for errors."
